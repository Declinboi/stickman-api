version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: stickman_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '${DB_PORT}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - stickman_network

  redis:
    image: redis:7-alpine
    container_name: stickman_redis
    restart: always
    ports:
      - '${REDIS_PORT}:6379'
    volumes:
      - redis_data:/data
    networks:
      - stickman_network

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: stickman_python
    restart: always
    env_file:
      - ./python-service/.env
    ports:
      - '8000:8000'
    networks:
      - stickman_network

volumes:
  postgres_data:
  redis_data:

networks:
  stickman_network:
    driver: bridge